<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haqqımızda - ŞOK Market</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <a href="index.html">Ana səhifə</a>
  <a href="products.html">Endirimlər</a>
  <a href="stores.html">Mağazalar</a>
</div>
<div class="overlay" id="overlay"></div>

<header>
  <div class="menu-btn" id="menuBtn">☰</div>
  <div class="logo">ŞOK MARKET</div>
</header>

<section>
  <h2>Haqqımızda</h2>
  <p>
    Şirkət rəhbəri <strong>Elvin Qasımov</strong> tərəfindən yaradılmış
    Şok Market müştəri məmnuniyyətini ön planda tutur.
  </p>
  <p>
    Endirim kampaniyaları və sərfəli qiymətlərlə xidmətinizdə023
  </p>
</section>

<footer>
  © 2026 Şok Market | Bütün hüquqlar qorunur
</footer>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", ()=>{
  sidebar.classList.add("active");
  overlay.classList.add("active");
});
overlay.addEventListener("click", ()=>{
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
});
</script>

</body>
</html>
