<!DOCTYPE html>

<title>Endirimlər - ŞOK Market</title>
<style>
/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#111;
    color:white;
    overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px 5%;
    position:relative;
    background:#ffd000;
}
.logo{
    font-size:28px;
    font-weight:bold;
    color:black;
}
.menu-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:28px;
    cursor:pointer;
    color:black;
}

/* ===== SIDEBAR ===== */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100%;
    background:#1a1a1a;
    padding-top:80px;
    transform:translateX(-100%);
    transition:0.4s ease;
    z-index:2000;
}
.sidebar.active{
    transform:translateX(0);
}
.sidebar a{
    display:block;
    padding:18px 25px;
    color:#ffd000;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}
.sidebar a:hover{
    background:#ffd000;
    color:black;
}

/* ===== OVERLAY ===== */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    opacity:0;
    visibility:hidden;
    transition:0.3s;
    z-index:1500;
}
.overlay.active{
    opacity:1;
    visibility:visible;
}

/* ===== SECTION ===== */
section{
    padding:80px 5%;
    text-align:center;
}
h1,h2{
    color:#ffd000;
    margin-bottom:20px;
}
p{
    font-size:16px;
    line-height:1.6;
    margin-bottom:15px;
}

/* ===== PRODUCTS ===== */
.product-container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:20px;
    max-width:1000px;
    margin:0 auto;
}

.product-card{
    background:#1e1e1e;
    border-radius:15px;
    padding:15px;
    position:relative;
    transition:0.3s;
}
.product-card:hover{
    transform:translateY(-6px);
}
.product-card img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:10px;
}
.product-card h3{
    margin:12px 0 8px;
    color:#ffd000;
}
.product-card p{
    color:#ccc;
}
.old-price{
    text-decoration: line-through;
    color: gray;
    margin-right: 8px;
}
.new-price{
    color: red;
    font-weight:bold;
    font-size:16px;
}
.discount-badge{
    position:absolute;
    top:10px;
    left:10px;
    background:red;
    color:white;
    padding:5px 8px;
    font-size:12px;
    font-weight:bold;
    border-radius:6px;
}

/* ===== FOOTER ===== */
footer{
    background:black;
    color:#ffd000;
    text-align:center;
    padding:20px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    h1,h2{font-size:24px;}
    p{font-size:14px;}
    .product-container{
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }
}
</style>
</head>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", ()=>{
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
});
overlay.addEventListener("click", ()=>{
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
});
</script>
