<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endirimlər - ŞOK Market</title>
<style>
/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#111;
    color:white;
    overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px 5%;
    position:relative;
    background:#ffd000;
}
.logo{
    font-size:28px;
    font-weight:bold;
    color:black;
}
.menu-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:28px;
    cursor:pointer;
    color:black;
}

/* ===== SIDEBAR ===== */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100%;
    background:#1a1a1a;
    padding-top:80px;
    transform:translateX(-100%);
    transition:0.4s ease;
    z-index:2000;
}
.sidebar.active{
    transform:translateX(0);
}
.sidebar a{
    display:block;
    padding:18px 25px;
    color:#ffd000;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}
.sidebar a:hover{
    background:#ffd000;
    color:black;
}

/* ===== OVERLAY ===== */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    opacity:0;
    visibility:hidden;
    transition:0.3s;
    z-index:1500;
}
.overlay.active{
    opacity:1;
    visibility:visible;
}

/* ===== SECTION ===== */
section{
    padding:80px 5%;
    text-align:center;
}
h1,h2{
    color:#ffd000;
    margin-bottom:20px;
}
p{
    font-size:16px;
    line-height:1.6;
    margin-bottom:15px;
}

/* ===== PRODUCTS ===== */
.product-container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:20px;
    max-width:1000px;
    margin:0 auto;
}

.product-card{
    background:#1e1e1e;
    border-radius:15px;
    padding:15px;
    position:relative;
    transition:0.3s;
}
.product-card:hover{
    transform:translateY(-6px);
}
.product-card img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:10px;
}
.product-card h3{
    margin:12px 0 8px;
    color:#ffd000;
}
.product-card p{
    color:#ccc;
}
.old-price{
    text-decoration: line-through;
    color: gray;
    margin-right: 8px;
}
.new-price{
    color: red;
    font-weight:bold;
    font-size:16px;
}
.discount-badge{
    position:absolute;
    top:10px;
    left:10px;
    background:red;
    color:white;
    padding:5px 8px;
    font-size:12px;
    font-weight:bold;
    border-radius:6px;
}

/* ===== FOOTER ===== */
footer{
    background:black;
    color:#ffd000;
    text-align:center;
    padding:20px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    h1,h2{font-size:24px;}
    p{font-size:14px;}
    .product-container{
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="index.html">Ana səhifə</a>
  <a href="about.html">Haqqımızda</a>
  <a href="stores.html">Mağazalar</a>
</div>
<div class="overlay" id="overlay"></div>

<header>
    <div class="menu-btn" id="menuBtn">☰</div>
    <div class="logo">ŞOK MARKET</div>
</header>

<section>
    <h2>Endirimdə olan məhsullar</h2>
    <div class="product-container">
        <!-- Example Product 1 -->
        <div class="product-card">
            <div class="discount-badge">-20%</div>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAySI4Hth4TcKc38y74pN05t_gD0_487J0MxX57Hggch1QTTB93KWCYJd1V0qRgcmQi9nHFF8qKJ0aURxd8jRhS1KBEJ_YRHMGwH69TCgSvQ&s=10" alt="Coca Cola">
            <h3>Coca Cola</h3>
            <p><span class="old-price">2.50 AZN</span><span class="new-price">1.99 AZN</span></p>
        </div>
        <!-- Example Product 2 -->
        <div class="product-card">
            <div class="discount-badge">-25%</div>
            <img src="https://strgimgr.b-cdn.net/img/product/840/ed477e89-85e6-4f4d-b1dd-f905c38b81d8.jpeg" alt="Fanta">
            <h3>Fanta Portaqal 0.5lt</h3>
            <p><span class="old-price">1.20 AZN</span><span class="new-price">0.90 AZN</span></p>
        </div>
        <!-- Example Product 3 -->
        <div class="product-card">
            <div class="discount-badge">-20%</div>
            <img src="https://via.placeholder.com/150x170?text=Peçenye" alt="Peçenye">
            <h3>Peçenye</h3>
            <p><span class="old-price">3.00 AZN</span><span class="new-price">2.40 AZN</span></p>
        </div>
        <!-- Example Product 4 -->
        <div class="product-card">
            <div class="discount-badge">-15%</div>
            <img src="https://via.placeholder.com/150x170?text=Məhsul" alt="Məhsul">
            <h3>Məhsul</h3>
            <p><span class="old-price">4.00 AZN</span><span class="new-price">3.40 AZN</span></p>
        </div>
    </div>
</section>

<footer>
    © 2026 ŞOK Market | Bütün hüquqlar qorunur
</footer>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", ()=>{
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
});
overlay.addEventListener("click", ()=>{
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
});
</script>

</body>
</html>
