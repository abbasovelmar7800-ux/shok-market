<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endirimlər - ŞOK Market</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <a href="about.html">Haqqımızda</a>
  <a href="products.html">Endirimlər</a>
  <a href="stores.html">Mağazalar</a>
</div>
<div class="overlay" id="overlay"></div>

<header>
  <div class="menu-btn" id="menuBtn">☰</div>
  <div class="logo">ŞOK MARKET</div>
</header>

<section>
  <h2>Endirimdə olan məhsullar</h2>
  <div class="product-container">

    <div class="product-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAySI4Hth4TcKc38y74pN05t_gD0_487J0MxX57Hggch1QTTB93KWCYJd1V0qRgcmQi9nHFF8qKJ0aURxd8jRhS1KBEJ_YRHMGwH69TCgSvQ&s=10">
        <h3>Coca Cola</h3>
        <p>Qiymət: 2.50 AZN</p>
    </div>

    <div class="product-card">
        <img src="https://strgimgr.b-cdn.net/img/product/840/ed477e89-85e6-4f4d-b1dd-f905c38b81d8.jpeg">
        <h3>Fanta Portaqal 0.5lt</h3>
        <p>Qiymət: 1.20 AZN</p>
    </div>

    <div class="product-card">
        <img src="sekil3.jpg">
        <h3>Peçenye</h3>
        <p>Qiymət: 3.00 AZN</p>
    </div>

    <div class="product-card">
        <img src="sekil4.jpg">
        <h3>Süd</h3>
        <p>Qiymət: 1.80 AZN</p>
    </div>

  </div>
</section>

<footer>
  © 2026 Şok Market | Bütün hüquqlar qorunur
</footer>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", ()=>{
  sidebar.classList.add("active");
  overlay.classList.add("active");
});
overlay.addEventListener("click", ()=>{
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
});
</script>

</body>
</html>
