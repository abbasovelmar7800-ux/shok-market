<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mağazalar - ŞOK Market</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <a href="about.html">Haqqımızda</a>
  <a href="products.html">Endirimlər</a>
  <a href="stores.html">Mağazalar</a>
</div>
<div class="overlay" id="overlay"></div>

<header>
  <div class="menu-btn" id="menuBtn">☰</div>
  <div class="logo">ŞOK MARKET</div>
</header>

<section>
  <h2>Mağazalarımız</h2>

  <div class="store-card">
    <img src="https://via.placeholder.com/280x180?text=Bakı+Mağaza">
    <h3>Bakı Mağaza</h3>
    <p>Ünvan: Nizami küçəsi 25</p>
  </div>

  <div class="store-card">
    <img src="https://via.placeholder.com/280x180?text=Gəncə+Mağaza">
    <h3>Gəncə Mağaza</h3>
    <p>Ünvan: Nizami prospekti 10</p>
  </div>

  <div class="store-card">
    <img src="https://via.placeholder.com/280x180?text=Sumqayıt+Mağaza">
    <h3>Sumqayıt Mağaza</h3>
    <p>Ünvan: Heydər Əliyev prospekti 5</p>
  </div>

</section>

<footer>
  © 2026 Şok Market | Bütün hüquqlar qorunur
</footer>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", ()=>{
  sidebar.classList.add("active");
  overlay.classList.add("active");
});
overlay.addEventListener("click", ()=>{
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
});
</script>

</body>
</html>
