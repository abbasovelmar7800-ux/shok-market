<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŞOK MARKET</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <a href="index.html">Ana səhifə</a>
  <a href="products.html">Endirimlər</a>
  <a href="about.html">Haqqımızda</a>
  <a href="stores.html">Mağazalar</a>
</div>
<div class="overlay" id="overlay"></div>

<header>
  <div class="menu-btn" id="menuBtn">☰</div>
  <div class="logo">ŞOK MARKET</div>
</header>

<section class="hero">
  <div>
    <h1>Böyük Endirim Kampaniyası</h1>
    <p>Ən sərfəli qiymətlər burada</p>
    <a href="products.html"><button>Alışa Başla</button></a>
  </div>
</section>

<footer>
  © 2026 ŞOK MARKET | Bütün hüquqlar qorunur
</footer>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", ()=>{
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
});

overlay.addEventListener("click", ()=>{
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
});
</script>

</body>
</html>
